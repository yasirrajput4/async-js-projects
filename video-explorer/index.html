<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="page-header">
        <a href="../index.html" class="back-link">← Back to Hub</a>
        <div class="header-badge">Live API</div>
        <h1>🎬 Video Explorer</h1>
        <p class="header-sub">
          Browse and search YouTube-style videos from a live public feed.
        </p>
      </header>

      <div class="search-box">
        <input
          id="query"
          type="text"
          placeholder="Search by title..."
          autocomplete="off"
        />
        <button id="searchbtn">Search</button>
      </div>

      <main id="video-container"></main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
