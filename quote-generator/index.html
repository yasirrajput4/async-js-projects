<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Playfair+Display:ital,wght@0,600;1,500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <a href="../index.html" class="back-link">← Back to Hub</a>

      <header class="page-header">
        <div class="header-badge">Random Quote</div>
        <h1>💬 Quote Generator</h1>
        <p class="header-sub">
          Discover, copy, and share a fresh quote on every click.
        </p>
      </header>

      <div id="container" class="quote-card"></div>

      <div class="btn-box">
        <button id="btn">🔄 New Quote</button>
        <button id="copyBtn">📋 Copy</button>
        <button id="twitterBtn">𝕏 Share</button>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
